<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>동물 놀이동산 🎪</title>
<link href="https://fonts.googleapis.com/css2?family=Gugi&family=Nanum+Gothic:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07111f; --card:#0c1d34; --bdr:#193050;
  --gold:#FFD43B; --teal:#2dd4c8; --coral:#ff6454;
  --purple:#b584fa; --green:#3de888; --sky:#7dd3fc;
  --text:#eef6ff; --muted:#486585; --r:18px;
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Gugi',sans-serif;user-select:none;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 90% 55% at 50% -5%,rgba(45,212,200,.09),transparent),
             radial-gradient(ellipse 60% 50% at 90% 110%,rgba(181,132,250,.08),transparent)}

/* ── UI 공통 ── */
.screen{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;
        transition:opacity .25s,transform .25s;padding-top:var(--sat);padding-bottom:var(--sab);overflow-y:auto;}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(.94)}
.top-bar{width:100%;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;flex-shrink:0;}
.back-btn{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:8px 14px;color:var(--muted);font-family:'Gugi',sans-serif;font-size:16px;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,.2);}
.back-btn:active{transform:scale(0.92);}
.title-text{font-size:22px;color:var(--gold);}

/* ═══════════════════════
   HUB
═══════════════════════ */
#hub{justify-content:center;padding:20px;gap:20px;}
.hub-title{font-size:42px;color:var(--gold);text-shadow:0 0 20px rgba(255,212,59,.4);text-align:center;margin-bottom:10px;}
.hub-grid{display:grid;grid-template-columns:1fr;gap:16px;width:100%;max-width:340px;}
.hub-btn{background:var(--card);border:2px solid var(--bdr);border-radius:24px;padding:24px 20px;
         display:flex;align-items:center;gap:16px;cursor:pointer;transition:transform .15s;box-shadow:0 8px 20px rgba(0,0,0,.3);}
.hub-btn:active{transform:scale(0.92);}
.hub-btn.quiz{border-color:var(--teal);background:linear-gradient(135deg,#0c1d34,rgba(45,212,200,.1));}
.hub-btn.puzzle{border-color:var(--purple);background:linear-gradient(135deg,#0c1d34,rgba(181,132,250,.1));}
.hub-btn.dic{border-color:var(--gold);background:linear-gradient(135deg,#0c1d34,rgba(255,212,59,.1));}
.hub-icon{font-size:48px;}
.hub-info{display:flex;flex-direction:column;align-items:flex-start;}
.hub-name{font-size:24px;color:var(--text);margin-bottom:4px;}
.hub-desc{font-size:14px;color:var(--muted);font-family:'Nanum Gothic',sans-serif;font-weight:700;}
.fs-btn{margin-top:20px;background:none;border:1px solid var(--muted);color:var(--muted);padding:8px 16px;border-radius:12px;font-family:'Gugi';cursor:pointer;}

/* ═══════════════════════
   도감 (COLLECTION)
═══════════════════════ */
#collection{justify-content:flex-start;}
.dic-stats{font-size:18px;color:var(--teal);margin-bottom:16px;}
.dic-grid{
  display:grid; grid-template-columns:repeat(5, 1fr); gap:8px; 
  width:100%; max-width:600px; padding:0 16px 40px;
}
.dic-item{
  background:var(--card); border:1px solid var(--bdr); border-radius:12px; 
  padding:8px 2px; display:flex; flex-direction:column; align-items:center; gap:4px;
}
.dic-item.locked .dic-e{filter:brightness(0) opacity(0.2) !important;}
.dic-item.locked .dic-n{color:var(--muted);}
.dic-e{font-size:32px; transition:transform .2s;}
.dic-n{font-size:11px; color:var(--text); text-align:center; word-break:keep-all; line-height:1.2;}
.dic-item.unlocked:active .dic-e{transform:scale(1.2);}
.reset-btn{background:rgba(255,100,84,.1);border:1px solid var(--coral);color:var(--coral);padding:10px 20px;border-radius:16px;font-family:'Gugi';margin-bottom:30px;cursor:pointer;}

/* ═══════════════════════
   스무고개
═══════════════════════ */
#quiz{justify-content:flex-start;padding-bottom:16px;}
.lives-wrap{display:flex;align-items:center;gap:3px}
.heart{font-size:20px;transition:transform .2s;display:inline-block}
.heart.lost{filter:grayscale(1);opacity:.3}
.heart.pop{animation:heart-pop .4s ease}
@keyframes heart-pop{0%{transform:scale(1)}30%{transform:scale(1.5)}60%{transform:scale(.8)}100%{transform:scale(1)}}
.sil-wrap{flex:1 1 0;min-height:0;width:100%;display:flex;align-items:center;justify-content:center;position:relative;margin:10px 0;}
.sil{font-size:clamp(88px,35vmin,160px);line-height:1;display:inline-block;transition:filter 1.2s ease,transform 1.2s ease;cursor:pointer;}
.sil:active{transform:scale(0.9) !important;} 
.sil.show{filter:var(--hr)!important;transform:scale(1.18)!important;animation:bigpop .65s cubic-bezier(.2,1.6,.35,1)}
@keyframes bigpop{0%{transform:scale(.6) rotate(-10deg)}55%{transform:scale(1.3) rotate(5deg)}78%{transform:scale(1.14) rotate(-2deg)}100%{transform:scale(1.18)}}
.hint-box{flex:0 0 auto;width:calc(100% - 32px);background:var(--card);border:1px solid var(--bdr);border-radius:var(--r);position:relative;padding:16px 22px;min-height:70px;display:flex;align-items:center;justify-content:center;text-align:center;margin-bottom:12px;}
.hl-tag{position:absolute;top:-13px;left:18px;background:var(--gold);color:#1a0800;font-size:12px;font-weight:800;padding:3px 14px;border-radius:20px;font-family:'Nanum Gothic',sans-serif}
.ht{font-family:'Nanum Gothic',sans-serif;font-size:17px;line-height:1.5;color:var(--text);font-weight:800;word-break:keep-all}
.act{flex:0 0 auto;width:calc(100% - 32px);display:flex;flex-direction:column;gap:8px}
.abtn{width:100%;padding:15px;border-radius:var(--r);border:none;font-family:'Gugi',sans-serif;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .12s}
.abtn:active{transform:scale(.92)}
.abtn.pri{background:linear-gradient(135deg,var(--gold),#ffb01e);color:#1a0800;}
.abtn.sec{background:var(--card);border:1px solid var(--bdr);color:var(--text);font-size:15px;padding:12px}
.abtn.gue{background:rgba(181,132,250,.16);border:1.5px solid var(--purple);color:var(--purple);font-size:16px;padding:13px}
.clabel{font-size:16px;font-weight:800;color:var(--sky);text-align:center;}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.cbtn{background:var(--card);border:2px solid var(--bdr);border-radius:var(--r);padding:10px 6px;cursor:pointer;font-family:'Gugi',sans-serif;display:flex;flex-direction:column;align-items:center;gap:4px;}
.cbtn:active{transform:scale(.88)}
.ce{font-size:36px;}.cn{font-size:13px;color:var(--text);text-align:center;}
.cbtn.ok{border-color:var(--green)!important;background:rgba(61,232,136,.18)!important;}
.cbtn.ng{background:rgba(255,100,84,.25);border-color:var(--coral);opacity:0.4;pointer-events:none;}

/* ═══════════════════════
   조각 퍼즐 (JIGSAW)
═══════════════════════ */
#puzzle{justify-content:flex-start;}
.pz-diff-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px;max-width:320px;}
.diff-btn{background:var(--card);border:1px solid var(--muted);color:var(--muted);padding:8px 12px;border-radius:12px;font-family:'Gugi';cursor:pointer;font-size:14px;}
.diff-btn.active{background:rgba(255,212,59,.15);border-color:var(--gold);color:var(--gold);}
.pz-top-area { display:flex; justify-content:space-between; align-items:flex-end; width:100%; max-width:320px; margin-bottom:16px; }
.pz-time { font-size:22px; color:var(--sky); margin-bottom:4px;}
.pz-thumb-wrap { width:60px; height:60px; background:var(--card); border:2px solid var(--bdr); border-radius:12px; padding:2px; box-shadow:0 4px 10px rgba(0,0,0,0.3); }
.pz-thumb-inner { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:38px; line-height:1; border-radius:8px;
  background: radial-gradient(circle at 0% 0%, #FFD43B 0%, transparent 60%), radial-gradient(circle at 100% 100%, #3de888 0%, transparent 60%), radial-gradient(circle at 100% 0%, #ff6454 0%, transparent 60%), radial-gradient(circle at 0% 100%, #7dd3fc 0%, transparent 60%), #b584fa;
}
.pz-grid-wrap{
  width:320px; height:320px; background:var(--bdr); border:4px solid var(--card); 
  border-radius:16px; position:relative; box-shadow:0 8px 24px rgba(0,0,0,0.3);
}
.pz-grid{
  display:grid; width:100%; height:100%; gap:0; box-sizing:border-box; background:var(--bg);
}
.pz-piece{
  position:relative; overflow:hidden; cursor:pointer;
  transition:transform 0.15s, box-shadow 0.3s; box-sizing:border-box;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,0.25);
}
.pz-piece.sel{ outline:3px solid var(--coral); transform:scale(0.9); z-index:10; }
.pz-piece.ok{ box-shadow:none; pointer-events:none; } 
.pz-inner{
  position:absolute; width:320px; height:320px; display:flex; align-items:center; 
  justify-content:center; font-size:240px; line-height:1; pointer-events:none;
  background: radial-gradient(circle at 0% 0%, #FFD43B 0%, transparent 60%), radial-gradient(circle at 100% 100%, #3de888 0%, transparent 60%), radial-gradient(circle at 100% 0%, #ff6454 0%, transparent 60%), radial-gradient(circle at 0% 100%, #7dd3fc 0%, transparent 60%), #b584fa;
}

/* ═══════════════════════
   공통 모달 & 애니메이션
═══════════════════════ */
.overlay{position:fixed;inset:0;z-index:20;background:rgba(4,9,22,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;backdrop-filter:blur(6px);}
.overlay.hidden{display:none!important}
.mbox{background:linear-gradient(155deg,#0c1d36,#0b1c32);border:1.5px solid var(--bdr);border-radius:28px;padding:28px 22px;max-width:320px;width:100%;text-align:center;}
.micon{font-size:64px;margin-bottom:10px;}
.mtitle{font-size:26px;color:var(--gold);margin-bottom:6px;}
.msub{font-family:'Nanum Gothic',sans-serif;font-weight:800;font-size:15px;color:var(--muted);margin-bottom:20px;line-height:1.5;word-break:keep-all;}
.mbtn{width:100%;padding:16px;border-radius:20px;border:none;font-family:'Gugi',sans-serif;font-size:18px;cursor:pointer;margin-bottom:8px;background:linear-gradient(135deg,var(--gold),#ff9a2c);color:#1a0800;transition:all 0.2s;}
.mbtn:active{transform:scale(.92)}
.mbtn.sec{background:var(--card);border:1px solid var(--bdr);color:var(--text);}

/* 💡 다음 문제 버튼 시선 유도 깜빡임(Pulse) */
.blink-btn {
  animation: pulseBtn 1s infinite alternate !important;
}
@keyframes pulseBtn {
  0% { transform: scale(1); box-shadow: 0 0 0 rgba(255,212,59,0); filter: brightness(1); }
  100% { transform: scale(1.04); box-shadow: 0 0 20px rgba(255,212,59,0.8); filter: brightness(1.15); }
}

.dance {animation: happyDance 1.2s ease-in-out infinite;}
@keyframes happyDance {0%, 100% { transform: translateY(0) scale(1) rotate(0deg); } 25% { transform: translateY(-15px) scale(1.1) rotate(-8deg); } 75% { transform: translateY(-15px) scale(1.1) rotate(8deg); }}
</style>
</head>
<body>

<div class="screen" id="hub">
  <div class="hub-title">동물 놀이동산</div>
  <div class="hub-grid">
    <div class="hub-btn quiz" onclick="startQuiz()">
      <div class="hub-icon">🕵️</div>
      <div class="hub-info"><div class="hub-name">동물 퀴즈</div><div class="hub-desc">누구일까? 맞춰봐요!</div></div>
    </div>
    <div class="hub-btn puzzle" onclick="startPiecePuzzle()">
      <div class="hub-icon">🧩</div>
      <div class="hub-info"><div class="hub-name">그림 조각 맞추기</div><div class="hub-desc">퍼즐을 완성해봐요!</div></div>
    </div>
    <div class="hub-btn dic" onclick="showCollection()">
      <div class="hub-icon">📖</div>
      <div class="hub-info"><div class="hub-name">동물 도감</div><div class="hub-desc">내가 모은 친구들!</div></div>
    </div>
  </div>
  <button class="fs-btn" onclick="toggleFullScreen()">📱 꽉 찬 화면으로 하기</button>
</div>

<div class="screen hidden" id="quiz">
  <div class="top-bar">
    <button class="back-btn" onclick="goHub()">← 뒤로</button>
    <div class="title-text" id="q-streak" style="font-size:16px;">🔥 0연속 정답!</div>
    <div class="lives-wrap" id="lives-wrap"></div>
  </div>
  <div class="sil-wrap" onclick="pokeSilhouette()"><span class="sil" id="sil">❓</span></div>
  <div class="hint-box"><div class="hl-tag">힌트</div><div class="ht empty" id="ht">버튼을 눌러봐요! 🔊</div></div>
  <div class="act" id="act"></div>
</div>

<div class="screen hidden" id="puzzle">
  <div class="top-bar">
    <button class="back-btn" onclick="goHub()">← 포기</button>
    <div class="title-text">그림 조각 맞추기</div>
  </div>
  <div class="pz-diff-btns">
    <button class="diff-btn" id="db3" onclick="startPiecePuzzle(3)">9조각</button>
    <button class="diff-btn" id="db4" onclick="startPiecePuzzle(4)">16조각</button>
    <button class="diff-btn" id="db5" onclick="startPiecePuzzle(5)">25조각</button>
    <button class="diff-btn" id="db6" onclick="startPiecePuzzle(6)">36조각</button>
    <button class="diff-btn" id="db7" onclick="startPiecePuzzle(7)">49조각</button>
    <button class="diff-btn" id="db8" onclick="startPiecePuzzle(8)">64조각</button>
  </div>
  <div class="pz-top-area">
    <div class="pz-time">⏱️ <span id="pz-timer">00:00</span></div>
    <div class="pz-thumb-wrap">
      <div class="pz-thumb-inner" id="pz-thumb">❓</div>
    </div>
  </div>
  <div class="pz-grid-wrap">
    <div class="pz-grid" id="pz-grid"></div>
  </div>
</div>

<div class="screen hidden" id="collection">
  <div class="top-bar">
    <button class="back-btn" onclick="goHub()">← 뒤로</button>
    <div class="title-text">나의 동물 도감</div>
  </div>
  <div class="dic-stats">모은 친구들: <span id="dic-count">0</span> / <span id="dic-total">0</span></div>
  <div class="dic-grid" id="dic-grid"></div>
  <button class="reset-btn" onclick="resetCollection()">🗑️ 도감 처음부터 다시하기</button>
</div>

<div class="overlay hidden" id="modal">
  <div class="mbox">
    <div class="micon" id="md-icon">🎉</div>
    <div class="mtitle" id="md-title">성공!</div>
    <div class="msub" id="md-sub">잘했어요!</div>
    <button class="mbtn" id="md-btn1" onclick="goHub()">확인</button>
    <button class="mbtn sec" id="md-btn2" style="display:none;" onclick="">취소</button>
  </div>
</div>

<script>
// 💡 110종 순도 100% 무결성 동물 DB
const DB=[
  /* ── 포유류 (반려동물 & 농장) ── */
  {n:'강아지',e:'🐕',f:'코는 사람보다 10000배나 냄새를 잘 맡아요!', h:['네 발로 걸어다녀요.','복슬복슬한 털이 있어요.','멍멍 하고 짖어요.']},
  {n:'푸들',e:'🐩',f:'털이 잘 빠지지 않고 머리가 아주 똑똑한 강아지예요!', h:['털이 뽀글뽀글하게 곱슬거려요.','프랑스에서 온 영리한 강아지예요.','강아지 중에서 아주 똑똑해요.']},
  {n:'고양이',e:'🐈',f:'하루에 16시간씩 자기도 해요!', h:['살금살금 조용히 걸어요.','수염이 있고 귀가 뾰족해요.','야옹 하고 소리를 내요.']},
  {n:'검은고양이',e:'🐈‍⬛',f:'어둠 속에서도 빛을 모아 앞을 아주 잘 볼 수 있어요!', h:['온몸이 새까만 털로 덮여 있어요.','할로윈이나 마녀와 잘 어울려요.','밤에 눈만 반짝여요.']},
  {n:'토끼',e:'🐰',f:'귀가 360도 돌아가서 소리를 잘 들어요!', h:['깡충깡충 뛰어요.','귀가 길쭉하게 쫑긋 서 있어요.','당근을 먹어요.']},
  {n:'생쥐',e:'🐁',f:'아주 작은 구멍도 몸을 쏙 줄여서 통과할 수 있어요!', h:['몸집이 아주 작아요.','꼬리가 길고 털이 없어요.','찍찍 소리를 내요.']},
  {n:'소',e:'🐄',f:'색맹이어서 빨간색을 볼 수 없어요!', h:['네 발을 가진 큰 동물이에요.','풀밭에서 풀을 뜯어 먹어요.','음메 하고 울어요.']},
  {n:'물소',e:'🐃',f:'물속에 들어가는 것을 아주 좋아해서 물소라고 불려요!', h:['소와 비슷하지만 뿔이 뒤로 구부러져 있어요.','몸이 아주 튼튼하고 까만색이에요.','더우면 진흙 목욕을 해요.']},
  {n:'돼지',e:'🐖',f:'사실은 화장실과 잠자리를 구분하는 깨끗한 동물이에요!', h:['분홍빛 피부를 가졌어요.','코가 납작하고 동그래요.','꿀꿀 하고 소리를 내요.']},
  {n:'말',e:'🐎',f:'눈을 감지 않고 서서도 잠을 자요!', h:['다리가 네 개인 큰 동물이에요.','달리기를 아주 잘해요.','히힝 하고 소리를 내요.']},
  {n:'양',e:'🐑',f:'눈을 움직이지 않고 360도 주변을 볼 수 있어요!', h:['온몸이 하얀 보들보들한 털로 덮였어요.','메에 하고 소리를 내요.','풀밭에서 풀을 먹어요.']},
  {n:'숫양',e:'🐏',f:'머리에 아주 크고 단단한 뿔이 돌돌 말려 있어요!', h:['양의 친구인데 멋진 뿔이 있어요.','뿔로 들이받기를 잘해요.','높은 산 위에서 살기도 해요.']},
  {n:'염소',e:'🐐',f:'눈동자가 직사각형이어서 세상을 넓게 봐요!', h:['네 발을 가진 동물이에요.','턱에 수염이 있어요.','산비탈도 잘 올라다녀요.']},

let unlocked = JSON.parse(localStorage.getItem('animal_dic')||'[]');
let ax=null;
let streak=0;

function initA(){ try{if(!ax) ax=new(window.AudioContext||window.webkitAudioContext)();}catch(e){} }
function playDing(){ if(!ax)return; const o=ax.createOscillator(),g=ax.createGain(); o.connect(g);g.connect(ax.destination); o.type='sine';o.frequency.setValueAtTime(800,ax.currentTime); g.gain.setValueAtTime(0,ax.currentTime); g.gain.linearRampToValueAtTime(.2,ax.currentTime+.05); g.gain.linearRampToValueAtTime(0,ax.currentTime+.3); o.start();o.stop(ax.currentTime+.3); }

/* 💡 새로운 '짜-잔~!' 효과음 (도-미-솔 화음 연주) */
function playTada(){
  if(!ax)return;
  const t=ax.currentTime;
  [[523.25,0,.15], [659.25,0,.15], [783.99,0,.15], 
   [1046.5,0.2,.4], [1318.51,0.2,.4], [1567.98,0.2,.4]].forEach(([f,dl,d])=>{
    const o=ax.createOscillator(),g=ax.createGain();
    o.connect(g);g.connect(ax.destination);o.type='triangle';o.frequency.value=f;
    g.gain.setValueAtTime(0,t+dl);g.gain.linearRampToValueAtTime(.15,t+dl+.05);g.gain.linearRampToValueAtTime(0,t+dl+d);
    o.start(t+dl);o.stop(t+dl+d+.1);
  });
}

function playPop(){ if(!ax)return; const o=ax.createOscillator(),g=ax.createGain(); o.connect(g);g.connect(ax.destination); o.type='sine';o.frequency.setValueAtTime(400,ax.currentTime); o.frequency.exponentialRampToValueAtTime(800,ax.currentTime+.1); g.gain.setValueAtTime(.2,ax.currentTime); g.gain.exponentialRampToValueAtTime(0.01,ax.currentTime+.1); o.start();o.stop(ax.currentTime+.1); }

/* 💡 BGM 개선: 소리를 더 부드럽고 잔잔하게 */
let mOn=true, mt=null;
const ML=[[523.25,.5],[659.26,.5],[783.99,.5],[659.26,.5],[523.25,.25],[587.33,.25],[659.26,.5],[523.25,.5],[440,.5],[523.25,.5],[587.33,.5],[523.25,.5],[392,.5],[440,.5],[523.25,.5],[659.26,.25],[523.25,.25],[783.99,.5],[880,.5],[783.99,.5],[659.26,.5],[587.33,.5],[659.26,.5],[523.25,1]];
const BT=.33;
function bgm(){
  if(!ax||!mOn)return;
  let t=ax.currentTime+.05;
  ML.forEach(([f,b])=>{
    const o=ax.createOscillator(),g=ax.createGain();
    o.connect(g);g.connect(ax.destination);o.type='sine';o.frequency.value=f;
    const d=b*BT;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(.015,t+.04); // BGM 볼륨 아주 작게
    g.gain.linearRampToValueAtTime(.01,t+d*.75);
    g.gain.linearRampToValueAtTime(0,t+d-.02);
    o.start(t);o.stop(t+d);t+=d;
  });
  mt=setTimeout(()=>{if(mOn)bgm();},ML.reduce((a,[,b])=>a+b,0)*BT*1000+200);
}

/* ═══════════════════════════════════════
   TTS & 화면 첫 터치 로직 (모바일 버그 패치 및 BGM 시작)
═══════════════════════════════════════ */
let vko=null;
let mediaUnlocked = false; 

function loadV(){ 
  const ko=(window.speechSynthesis?.getVoices()||[]).filter(v=>v.lang.startsWith('ko')); 
  vko=ko.find(v=>v.name.includes('Google')||v.name.includes('SunHi')||/(여성|female|woman|girl|혜|수|지|은|미)/i.test(v.name))||ko[0]||null; 
}
loadV(); if(window.speechSynthesis) window.speechSynthesis.onvoiceschanged=loadV;

// 💡 화면 첫 터치 시 TTS 잠금 해제 + BGM 자동 재생
function unlockMedia() {
  if(mediaUnlocked) return;
  mediaUnlocked = true;
  
  if(window.speechSynthesis) {
    const u = new SpeechSynthesisUtterance('');
    u.volume = 0; 
    window.speechSynthesis.speak(u);
  }
  
  initA();
  if(ax && ax.state === 'suspended') {
    ax.resume().then(() => { if(mOn) bgm(); });
  } else if(ax && ax.state === 'running') {
    if(mOn) bgm();
  }
}
document.body.addEventListener('touchstart', unlockMedia, {once:true});
document.body.addEventListener('click', unlockMedia, {once:true});

function speak(t, pitch=1.1, rate=0.85, onEndCallback=null){
  if(!window.speechSynthesis) {
    if(onEndCallback) onEndCallback();
    return; 
  }
  window.speechSynthesis.cancel();
  setTimeout(() => {
    let adjustedText = t.replace(/나는 /g, '나는, ').replace(/있어요/g, '있어요.').replace(/거예요/g, '거예요.');
    const u=new SpeechSynthesisUtterance(adjustedText); 
    u.lang='ko-KR'; u.rate=rate; u.pitch=pitch; 
    if(vko) u.voice=vko;
    if(onEndCallback) u.onend = onEndCallback;
    window.speechSynthesis.speak(u);
  }, 50); 
}

function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); initA(); }
function goHub(){ show('hub'); clearInterval(pzTimerInterval); }
function toggleFullScreen() {
  if (!document.fullscreenElement) { document.documentElement.requestFullscreen().catch(err=>{}); } 
  else { if (document.exitFullscreen) { document.exitFullscreen(); } }
}

function openModal(icon, title, sub, btn1Txt, btn1Cb, btn2Txt=null, btn2Cb=null, hR=0){
  const micon = document.getElementById('md-icon');
  micon.textContent=icon;
  micon.style.filter = `hue-rotate(${hR}deg)`; 
  document.getElementById('md-title').textContent=title;
  document.getElementById('md-sub').textContent=sub;
  
  const b1=document.getElementById('md-btn1'); 
  b1.classList.remove('blink-btn'); 
  b1.textContent=btn1Txt; 
  b1.onclick=()=>{closeModal(); if(btn1Cb)btn1Cb();};
  
  const b2=document.getElementById('md-btn2'); 
  if(btn2Txt){ b2.style.display=''; b2.textContent=btn2Txt; b2.onclick=()=>{closeModal(); if(btn2Cb)btn2Cb();}; } else { b2.style.display='none'; }
  document.getElementById('modal').classList.remove('hidden');
}
function closeModal(){ document.getElementById('modal').classList.add('hidden'); }

/* ═══════════════════════
   1. 스무고개 로직
═══════════════════════ */
let qLives=7, qCur=null, qHi=0, qPhase='hint';
let qChoices = []; // 💡 선택지 고정용 배열
const BLUR=[40,25,12,0]; const SCL=[.8,.9,1.0,1.1];

function getPraiseByStreak(s) {
  if (s < 3) return "정답이에요!";
  if (s < 5) return "우와! 대단해요!";
  if (s < 10) return "멋진 동물 탐험대!";
  if (s < 15) return "똑똑한 꼬마 학자님!";
  return "전설의 동물 박사 등장!";
}

function startQuiz(){
  qLives=7; renderHearts();
  const sil=document.getElementById('sil');
  sil.style.transition = 'none'; 
  sil.className = 'sil'; 
  sil.textContent = '❓';
  sil.style.setProperty('--hr', `hue-rotate(0deg)`);
  sil.style.filter = `brightness(0) blur(${BLUR[0]}px)`; 
  sil.style.transform = `scale(${SCL[0]})`;
  
  let idx=~~(Math.random()*DB.length); qCur=DB[idx]; qHi=0; qPhase='hint';
  const hR = qCur.hR || 0;
  sil.style.setProperty('--hr', `hue-rotate(${hR}deg)`);

  // 💡 문제 시작 시 선택지 4개를 미리 만들어서 고정
  const others=DB.filter(a=>a.n!==qCur.n).sort(()=>Math.random()-.5).slice(0,3);
  qChoices=[...others,qCur].sort(()=>Math.random()-.5);

  document.getElementById('ht').textContent='버튼을 눌러 힌트를 들어봐요! 🔊';
  renderQuizBtns(); 
  show('quiz'); 

  requestAnimationFrame(() => requestAnimationFrame(() => {
    sil.textContent = qCur.e;
    sil.style.transition = 'filter 1.2s ease, transform 1.2s ease';
  }));
  speak('무슨 동물일까요?');
}

function renderHearts(){
  const w=document.getElementById('lives-wrap'); w.innerHTML='';
  for(let i=0;i<7;i++){ const s=document.createElement('span'); s.className=i<qLives?'heart':'heart lost'; s.textContent=i<qLives?'❤️':'🖤'; w.appendChild(s); }
}

function renderQuizBtns(){
  const act=document.getElementById('act');
  const hasM=qHi<qCur.h.length;
  
  // 💡 보기 상시 노출 ("맞춰볼래요!" 버튼 제거)
  act.innerHTML=`
    ${hasM?`<button class="abtn pri" onclick="qNextHint()" style="margin-bottom:6px;">🔊 ${qHi===0?'힌트 듣기':'다음 힌트 듣기'}</button>`:''}
    <div style="font-size:15px; font-weight:800; color:var(--sky); text-align:center; margin-bottom:8px;">어떤 동물일까요? 골라봐요! 👇</div>
    <div class="cgrid">
      ${qChoices.map(c=>`<button class="cbtn" onclick="qCheck('${c.n}',this)">
        <span class="ce" style="filter:hue-rotate(${c.hR||0}deg)">${c.e}</span><span class="cn">${c.n}</span>
      </button>`).join('')}
    </div>
  `;
}

function qNextHint(){
  if(qHi>=qCur.h.length)return;
  const t=qCur.h[qHi]; document.getElementById('ht').textContent=t;
  qHi++; const step=Math.min(qHi,BLUR.length-1);
  const sil=document.getElementById('sil'); 
  sil.style.filter=`brightness(0) blur(${BLUR[step]}px) hue-rotate(${qCur.hR||0}deg)`; 
  sil.style.transform=`scale(${SCL[step]})`;
  speak(t); renderQuizBtns();
}

function qCheck(ans, btn){
  if(qPhase==='done') return;

  if(ans===qCur.n){
    qPhase = 'done';
    streak++;
    btn.classList.add('ok'); 
    
    // 💡 새로운 짜잔 화음 재생
    playTada(); 
    
    document.getElementById('q-streak').textContent = `🔥 ${streak}연속 정답!`;
    const sil = document.getElementById('sil');
    sil.style.filter = `hue-rotate(${qCur.hR||0}deg)`;
    sil.classList.add('show');
    if(!unlocked.includes(qCur.n)){ unlocked.push(qCur.n); localStorage.setItem('animal_dic',JSON.stringify(unlocked)); }
    
    const praise = getPraiseByStreak(streak);
    
    // 💡 1차 음성: 명확하게 정답을 얘기해줌
    speak(`딩동댕! 정답은, ${qCur.n}예요!`);
    
    setTimeout(()=>{
      openModal(qCur.e, praise, qCur.f, '다음 문제', startQuiz, '그만하기', goHub, qCur.hR||0);
      
      // 💡 2차 음성: 모달이 뜨면 동물 설명을 읽어주고, 완료 시 버튼 깜빡임
      speak(`${qCur.f} ${praise}`, 1.1, 0.85, () => {
         document.getElementById('md-btn1').classList.add('blink-btn');
      });
    }, 1800);

  } else {
    streak = 0; document.getElementById('q-streak').textContent = `🔥 0연속 정답!`;
    btn.classList.add('ng'); playDing(); qLives--; renderHearts();
    if(qLives<=0){
      speak('동물 친구들이 낮잠 자러 갔어요.');
      setTimeout(()=>openModal('😴', '낮잠 시간', '다음에 다시 놀아요!', '확인', goHub), 1000);
    } else { speak('아니에요. 다시 골라봐요.'); }
  }
}
function pokeSilhouette(){
  if(qPhase==='done') return;
  playPop();
  const sil=document.getElementById('sil');
  sil.style.transform = `scale(${SCL[Math.min(qHi,BLUR.length-1)] - 0.1}) rotate(${Math.random()*20-10}deg)`;
  setTimeout(()=> sil.style.transform = `scale(${SCL[Math.min(qHi,BLUR.length-1)]}) rotate(0deg)`, 150);
}

/* ═══════════════════════
   2. 조각 맞추기 퍼즐 
═══════════════════════ */
let pzTime=0, pzTimerInterval=null, curPzSize=3; 
let pzSelectedPiece=null;

function startPiecePuzzle(size = curPzSize){
  curPzSize = size;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`db${size}`).classList.add('active');

  let c = DB[~~(Math.random()*DB.length)];
  
  let thumb = document.getElementById('pz-thumb');
  thumb.textContent = c.e;
  thumb.style.filter = `hue-rotate(${c.hR||0}deg)`;

  let grid = document.getElementById('pz-grid');
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
  grid.style.gridTemplateRows = `repeat(${size}, 1fr)`;
  
  let pieceSize = 320 / size; 
  let arr = [];
  for(let i=0; i<size*size; i++) arr.push(i);
  arr.sort(()=>Math.random()-.5);
  
  arr.forEach(val => {
    let correctX = val % size;
    let correctY = Math.floor(val / size);
    let el = document.createElement('div');
    el.className = 'pz-piece';
    el.dataset.idx = val;
    
    let inner = document.createElement('div');
    inner.className = 'pz-inner';
    inner.style.left = `-${correctX * pieceSize}px`;
    inner.style.top = `-${correctY * pieceSize}px`;
    inner.style.filter = `hue-rotate(${c.hR||0}deg)`;
    inner.textContent = c.e;
    
    el.appendChild(inner);
    el.onclick = () => tapJigsawPiece(el);
    grid.appendChild(el);
  });
  
  pzSelectedPiece = null; pzTime = 0;
  clearInterval(pzTimerInterval);
  document.getElementById('pz-timer').textContent='00:00';
  
  pzTimerInterval = setInterval(()=>{
    pzTime++;
    let m = String(Math.floor(pzTime/60)).padStart(2,'0'); 
    let s = String(pzTime%60).padStart(2,'0');
    document.getElementById('pz-timer').textContent=`${m}:${s}`;
  },1000);
  
  show('puzzle');
  speak('조각을 눌러서 원본 그림과 똑같이 맞춰봐요!');
  checkJigsaw(true);
}

function tapJigsawPiece(el) {
  if(el.classList.contains('ok')) return;
  playPop();
  if(!pzSelectedPiece) {
    pzSelectedPiece = el; el.classList.add('sel');
  } else {
    if(pzSelectedPiece !== el) {
      let tIdx = pzSelectedPiece.dataset.idx;
      let tHtml = pzSelectedPiece.innerHTML;
      pzSelectedPiece.dataset.idx = el.dataset.idx;
      pzSelectedPiece.innerHTML = el.innerHTML;
      el.dataset.idx = tIdx; el.innerHTML = tHtml;
      pzSelectedPiece.classList.remove('sel');
      pzSelectedPiece = null;
      checkJigsaw();
    } else {
      pzSelectedPiece.classList.remove('sel'); pzSelectedPiece = null;
    }
  }
}

function checkJigsaw(isInit=false) {
  let pieces = document.querySelectorAll('.pz-piece');
  let correctCount = 0;
  pieces.forEach((p, i) => {
    if(parseInt(p.dataset.idx) === i) {
      if(!p.classList.contains('ok')) { p.classList.add('ok'); if(!isInit) playDing(); }
      correctCount++;
    } else { p.classList.remove('ok'); }
  });
  
  if(correctCount === pieces.length && !isInit) {
    clearInterval(pzTimerInterval);
    playTada(); // 💡 퍼즐 완성 시 짜잔 화음!
    
    let nextSize = curPzSize < 8 ? curPzSize + 1 : 8; 
    
    setTimeout(()=>{
      openModal('🏆', '퍼즐 완성!', `${pzTime}초 만에 멋지게 완성했어요!`, '더 어려운 퍼즐!', ()=>startPiecePuzzle(nextSize), '홈으로', goHub);
      
      speak(`우와! ${pzTime}초 만에 완성했어요! 정말 대단해요!`, 1.1, 0.85, () => {
         document.getElementById('md-btn1').classList.add('blink-btn');
      });
    }, 800);
  }
}

/* ═══════════════════════
   3. 도감 로직
═══════════════════════ */
function showCollection(){
  const grid=document.getElementById('dic-grid'); grid.innerHTML='';
  document.getElementById('dic-total').textContent=DB.length;
  document.getElementById('dic-count').textContent=unlocked.length;
  
  const sortedDB = [...DB].sort((a,b)=>a.n.localeCompare(b.n));
  sortedDB.forEach(c=>{
    const has = unlocked.includes(c.n);
    const el=document.createElement('div'); el.className=`dic-item ${has?'unlocked':'locked'}`;
    el.innerHTML=`<div class="dic-e" style="filter:hue-rotate(${has?(c.hR||0):0}deg)">${c.e}</div><div class="dic-n">${has?c.n:'???'}</div>`;
    if(has) el.onclick=()=>{ playPop(); speak(`${c.n}! ${c.f}`); el.querySelector('.dic-e').classList.add('dance'); setTimeout(()=>el.querySelector('.dic-e').classList.remove('dance'), 1200); };
    grid.appendChild(el);
  });
  show('collection');
}

function resetCollection(){
  openModal('🗑️', '도감 초기화', '모은 동물을 다 지우고 새로 시작할까요?', '네, 지울래요', ()=>{
    unlocked=[]; localStorage.setItem('animal_dic','[]'); showCollection();
  }, '아니요', ()=>{});
}
