<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>유나의 동물 놀이동산 🎪</title>
<style>
:root{
  --bg:#07111f; --card:#0c1d34; --bdr:#193050;
  --gold:#FFD43B; --teal:#2dd4c8; --coral:#ff6454;
  --purple:#b584fa; --green:#3de888; --sky:#7dd3fc;
  --text:#eef6ff; --muted:#486585; --r:18px;
  --sat:env(safe-area-inset-top,0px); --sab:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:none;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Malgun Gothic', '맑은 고딕', 'Apple SD Gothic Neo', sans-serif;user-select:none;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 90% 55% at 50% -5%,rgba(45,212,200,.09),transparent),
             radial-gradient(ellipse 60% 50% at 90% 110%,rgba(181,132,250,.08),transparent)}

.screen{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;
        transition:opacity .25s,transform .25s;padding-top:var(--sat);padding-bottom:var(--sab);overflow-y:auto; overflow-x:hidden;}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(.94)}
.top-bar{width:100%;display:flex;justify-content:space-between;align-items:center;padding:12px 16px;flex-shrink:0;}
.back-btn{background:var(--card);border:1px solid var(--bdr);border-radius:12px;padding:8px 14px;color:var(--muted);font-weight:bold;font-size:16px;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,.2);}
.back-btn:active{transform:scale(0.92);}
.title-text{font-size:22px;color:var(--gold);font-weight:bold;}

/* ═══════════════════════
   HUB
═══════════════════════ */
#hub{justify-content:center;padding:20px;gap:12px;}
.hub-title{font-size:46px;color:var(--gold);font-weight:900;text-shadow:0 0 20px rgba(255,212,59,.4);text-align:center;margin-bottom:10px;}
.hub-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;width:100%;max-width:600px;}
.hub-btn{background:var(--card);border:2px solid var(--bdr);border-radius:24px;padding:20px;
         display:flex;flex-direction:column;align-items:center;gap:12px;cursor:pointer;transition:transform .15s;box-shadow:0 8px 20px rgba(0,0,0,.3);text-align:center;}
.hub-btn:active{transform:scale(0.92);}
.hub-btn.quiz{border-color:var(--teal);background:linear-gradient(135deg,#0c1d34,rgba(45,212,200,.15));}
.hub-btn.puzzle{border-color:var(--purple);background:linear-gradient(135deg,#0c1d34,rgba(181,132,250,.15));}
.hub-btn.catch{border-color:var(--coral);background:linear-gradient(135deg,#0c1d34,rgba(255,100,84,.15));}
.hub-btn.phonics{border-color:var(--sky);background:linear-gradient(135deg,#0c1d34,rgba(125,211,252,.15));}
.hub-btn.dic{border-color:var(--gold);background:linear-gradient(135deg,#0c1d34,rgba(255,212,59,.15)); grid-column: 1 / -1; flex-direction:row; justify-content:center;}
.hub-icon{font-size:55px;}
.hub-name{font-size:22px;color:var(--text);font-weight:900;}
.hub-desc{font-size:14px;color:var(--muted);font-weight:bold;}
.fs-btn{margin-top:20px;background:none;border:1px solid var(--muted);color:var(--muted);padding:10px 20px;border-radius:12px;font-weight:bold;cursor:pointer;}

/* ═══════════════════════
   동물퀴즈
═══════════════════════ */
#quiz{justify-content:flex-start;padding-bottom:16px;}
.lives-wrap{display:flex;align-items:center;gap:4px}
.heart{font-size:22px;}
.heart.lost{filter:grayscale(1);opacity:.3}
.sil-wrap{flex:1 1 0;min-height:0;width:100%;display:flex;align-items:center;justify-content:center;position:relative;margin:10px 0;}
.sil{font-size:clamp(120px,40vmin,250px);line-height:1;display:inline-block;transition:filter 1.2s ease,transform 1.2s ease;}
.sil.show{filter:var(--hr)!important;transform:scale(1.1) rotate(0deg)!important;animation:bigpop .65s cubic-bezier(.2,1.6,.35,1)}
@keyframes bigpop{0%{transform:scale(.6) rotate(-10deg)}55%{transform:scale(1.2) rotate(5deg)}100%{transform:scale(1.1)}}
.hint-box{flex:0 0 auto;width:90%;max-width:600px;background:var(--card);border:2px solid var(--bdr);border-radius:var(--r);position:relative;padding:24px 22px;min-height:80px;display:flex;align-items:center;justify-content:center;text-align:center;margin-bottom:16px;}
.hint-pulse { animation: hintBlink 1.5s infinite alternate; }
@keyframes hintBlink { 0% { box-shadow: 0 0 0 rgba(125,211,252,0); border-color: var(--bdr); } 100% { box-shadow: 0 0 15px rgba(125,211,252,0.4); border-color: var(--sky); } }
.hl-tag{position:absolute;top:-14px;left:20px;background:var(--gold);color:#1a0800;font-size:14px;font-weight:900;padding:4px 16px;border-radius:20px;}
.ht{font-size:22px;line-height:1.5;color:var(--text);font-weight:bold;word-break:keep-all}
.act{flex:0 0 auto;width:90%;max-width:600px;display:flex;flex-direction:column;gap:10px}
.abtn{width:100%;padding:18px;border-radius:var(--r);border:none;font-weight:bold;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.abtn.pri{background:linear-gradient(135deg,var(--gold),#ffb01e);color:#1a0800;}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cbtn{background:var(--card);border:2px solid var(--bdr);border-radius:var(--r);padding:14px 6px;cursor:pointer;font-weight:bold;display:flex;flex-direction:column;align-items:center;gap:6px;}
.ce{font-size:45px;}.cn{font-size:16px;color:var(--text);text-align:center;}
.cbtn.ok{border-color:var(--green)!important;background:rgba(61,232,136,.18)!important;}
.cbtn.ng{background:rgba(255,100,84,.25);border-color:var(--coral);opacity:0.4;pointer-events:none;}

/* ═══════════════════════
   드래그 직소 퍼즐
═══════════════════════ */
#puzzle{justify-content:flex-start; align-items:center;}
.pz-diff-btns{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:16px;width:100%;max-width:800px;}
.diff-btn{background:var(--card);border:1px solid var(--muted);color:var(--muted);padding:10px 16px;border-radius:12px;font-weight:bold;cursor:pointer;font-size:16px;}
.diff-btn.active{background:rgba(255,212,59,.15);border-color:var(--gold);color:var(--gold);}
.pz-layout { display:flex; flex-direction:row; gap:20px; width:100%; max-width:900px; padding:0 20px; justify-content:center; align-items:center; flex-wrap:wrap; }
.pz-left { display:flex; flex-direction:column; align-items:center; gap:10px; }
.pz-right { display:flex; flex-direction:column; align-items:center; gap:10px; position:relative; }
.pz-preview { width:250px; height:250px; border:4px solid var(--bdr); border-radius:16px; background-size:cover; background-position:center; box-shadow:0 8px 24px rgba(0,0,0,0.3); }
.pz-board { width:400px; height:400px; background:var(--bdr); border:6px solid var(--card); border-radius:16px; position:relative; display:grid; gap:2px; box-shadow:0 8px 24px rgba(0,0,0,0.3); }
.pz-slot { background:rgba(0,0,0,0.4); width:100%; height:100%; box-sizing:border-box; border:1px dashed rgba(255,255,255,0.1); }
.pz-pieces-area { width:100%; max-width:800px; min-height:120px; background:rgba(255,255,255,0.03); border-radius:16px; margin-top:20px; display:flex; flex-wrap:wrap; gap:8px; padding:12px; justify-content:center; align-items:center; position:relative; z-index:10; }
.drag-piece { width:80px; height:80px; background-size:400px 400px; border:2px solid var(--gold); border-radius:8px; box-shadow:0 4px 8px rgba(0,0,0,0.5); cursor:grab; touch-action:none; position:absolute; z-index:100; }
.drag-piece.placed { position:static; border:none; box-shadow:none; border-radius:0; width:100%; height:100%; pointer-events:none; }

/* ═══════════════════════
   숨은 동물 찾기 (CATCH)
═══════════════════════ */
#catch{justify-content:flex-start;}
.catch-info{display:flex;justify-content:space-between;width:100%;max-width:600px;padding:0 20px;font-size:24px;font-weight:bold;color:var(--sky);margin-bottom:10px;}
.catch-area{flex:1;width:100%;max-width:800px;background:rgba(255,255,255,0.03);border:4px solid var(--bdr);border-radius:24px;position:relative;overflow:hidden;margin-bottom:20px;}
.catch-target{position:absolute;font-size:80px;transition:transform 0.1s;cursor:pointer;user-select:none;transform-origin:center;}
.catch-target:active{transform:scale(0.8);}

/* ═══════════════════════
   글자 따라 쓰기 (PHONICS & TRACING)
═══════════════════════ */
#phonics { justify-content:flex-start; align-items:center; }
.ph-layout { display:flex; flex-direction:column; align-items:center; gap:20px; width:100%; max-width:600px; padding:10px 20px; flex:1; }
.ph-top-card { display:flex; align-items:center; gap:20px; background:var(--card); border:3px solid var(--sky); border-radius:24px; padding:16px 30px; box-shadow:0 8px 20px rgba(0,0,0,0.3); cursor:pointer; }
.ph-top-card:active { transform:scale(0.95); }
.ph-emoji { font-size: 80px; filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5)); animation: floatEmoji 3s ease-in-out infinite; }
.ph-text-info { display:flex; flex-direction:column; gap:4px; }
.ph-ko { font-size:36px; font-weight:900; color:var(--gold); line-height:1;}
.ph-en { font-size:22px; font-weight:bold; color:var(--sky); line-height:1;}

@keyframes floatEmoji { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

.ph-board-wrap { position:relative; width:100%; max-width:400px; aspect-ratio:1/1; background:var(--card); border:4px solid var(--bdr); border-radius:24px; overflow:hidden; box-shadow:inset 0 0 20px rgba(0,0,0,0.5); }
.ph-canvas { position:absolute; inset:0; width:100%; height:100%; touch-action:none; cursor:crosshair; z-index:5; }
.ph-bg-text { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:140px; font-weight:900; color:rgba(255,255,255,0.07); pointer-events:none; z-index:1; }

.ph-tools { display:flex; gap:16px; width:100%; justify-content:center; }
.ph-tool-btn { display:flex; align-items:center; justify-content:center; gap:8px; padding:12px 24px; border-radius:16px; font-weight:bold; font-size:18px; border:none; cursor:pointer; }
.ph-tool-btn.clear { background:rgba(255,100,84,.15); border:2px solid var(--coral); color:var(--coral); }
.ph-tool-btn.clear:active { transform:scale(0.9); }

.ph-next-btn { width:100%; padding:18px; border-radius:20px; background:linear-gradient(135deg,var(--gold),#ff9a2c); color:#1a0800; font-size:20px; font-weight:900; border:none; cursor:pointer; margin-top:auto; margin-bottom:10px; box-shadow:0 8px 20px rgba(255,212,59,0.3); transition:transform 0.15s; }
.ph-next-btn:active { transform:scale(0.95); }

/* ═══════════════════════
   도감 (COLLECTION)
═══════════════════════ */
#collection{justify-content:flex-start;}
.dic-stats{font-size:20px;color:var(--teal);font-weight:bold;margin-bottom:16px;}
.dic-grid{display:grid; grid-template-columns:repeat(5, 1fr); gap:12px; width:100%; max-width:800px; padding:0 20px 40px;}
.dic-item{background:var(--card); border:1px solid var(--bdr); border-radius:12px; padding:12px 2px; display:flex; flex-direction:column; align-items:center; gap:6px;}
.dic-item.locked .dic-e{filter:brightness(0) opacity(0.2) !important;}
.dic-item.locked .dic-n{color:var(--muted);}
.dic-e{font-size:40px; transition:transform .2s;}
.dic-n{font-size:13px; color:var(--text); font-weight:bold; text-align:center;}

/* 공통 모달 & 애니메이션 */
.overlay{position:fixed;inset:0;z-index:20;background:rgba(4,9,22,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:22px;backdrop-filter:blur(6px);}
.overlay.hidden{display:none!important}
.mbox{background:linear-gradient(155deg,#0c1d36,#0b1c32);border:1.5px solid var(--bdr);border-radius:28px;padding:32px 26px;max-width:360px;width:100%;text-align:center;}
.micon{font-size:75px;margin-bottom:12px;}
.mtitle{font-size:30px;color:var(--gold);font-weight:900;margin-bottom:8px;}
.msub{font-weight:bold;font-size:17px;color:var(--muted);margin-bottom:24px;line-height:1.5;word-break:keep-all;}
.mbtn{width:100%;padding:18px;border-radius:20px;border:none;font-weight:900;font-size:20px;cursor:pointer;margin-bottom:10px;background:linear-gradient(135deg,var(--gold),#ff9a2c);color:#1a0800;transition:all 0.2s;}
.mbtn.sec{background:var(--card);border:1px solid var(--bdr);color:var(--text);}
.blink-btn { animation: pulseBtn 0.9s infinite alternate !important; }
@keyframes pulseBtn { 0% { transform: scale(1); box-shadow: 0 0 0 rgba(255,212,59,0); } 100% { transform: scale(1.05); box-shadow: 0 0 25px rgba(255,212,59,1); } }
</style>
</head>
<body>

<div class="screen" id="hub">
  <div class="hub-title">동물 놀이동산</div>
  <div class="hub-grid">
    <div class="hub-btn quiz" onclick="startQuiz()">
      <div class="hub-icon">🕵️</div>
      <div class="hub-info"><div class="hub-name">동물퀴즈</div><div class="hub-desc">누구일까? 맞춰봐요!</div></div>
    </div>
    <div class="hub-btn phonics" onclick="startPhonics()">
      <div class="hub-icon">🖍️</div>
      <div class="hub-info"><div class="hub-name">글씨 쓰기</div><div class="hub-desc">글자를 따라 써요!</div></div>
    </div>
    <div class="hub-btn puzzle" onclick="startJigsawPuzzle()">
      <div class="hub-icon">🧩</div>
      <div class="hub-info"><div class="hub-name">그림 맞추기</div><div class="hub-desc">퍼즐을 완성해봐요!</div></div>
    </div>
    <div class="hub-btn catch" onclick="startCatchGame()">
      <div class="hub-icon">🖐️</div>
      <div class="hub-info"><div class="hub-name">숨은 동물 찾기</div><div class="hub-desc">동물을 빨리 잡아요!</div></div>
    </div>
    <div class="hub-btn dic" onclick="showCollection()">
      <div class="hub-icon">📖</div>
      <div class="hub-info"><div class="hub-name">동물 도감</div><div class="hub-desc">내가 모은 친구들!</div></div>
    </div>
  </div>
  <button class="fs-btn" onclick="toggleFullScreen()">📱 꽉 찬 화면으로 하기</button>
</div>

<div class="screen hidden" id="quiz">
  <div class="top-bar">
    <button class="back-btn" onclick="goHub()">← 뒤로</button>
    <div class="title-text" id="q-streak" style="font-size:16px;">🔥 0연속 정답!</div>
    <div class="lives-wrap" id="lives-wrap"></div>
  </div>
  <div class="sil-wrap" onclick="pokeSilhouette()"><span class="sil" id="sil">❓</span></div>
  <div class="hint-box hint-pulse"><div class="hl-tag">힌트</div><div class="ht empty" id="ht">버튼을 눌러봐요! 🔊</div></div>
  <div class="act" id="act"></div>
</div>

<div class="screen hidden" id="phonics">
  <div class="top-bar">
    <button class="back-btn" onclick="goHub()">← 뒤로</button>
    <div class="title-text">글씨 쓰기 놀이</div>
  </div>
  <div class="ph-layout">
    <div class="ph-top-card" onclick="playDailyWord()">
      <div class="ph-emoji" id="ph-word-emoji">👩</div>
      <div class="ph-text-info">
        <div class="ph-ko" id="ph-word-ko">엄마</div>
        <div class="ph-en" id="ph-word-en">Mom</div>
      </div>
    </div>
    <div class="ph-board-wrap">
      <div class="ph-bg-text" id="ph-bg-text">엄마</div>
      <canvas class="ph-canvas" id="draw-canvas"></canvas>
    </div>
    <div class="ph-tools">
      <button class="ph-tool-btn clear" onclick="clearCanvas()">🗑️ 싹 지우기</button>
    </div>
    <button class="ph-next-btn" id="ph-next-btn" onclick="nextDailyWord()">다음 단어 쓰기 ➔</button>
  </div>
</div>

<div class="screen hidden" id="puzzle">
  <div class="top-bar">
    <button class="back-btn" onclick="goHub()">← 포기</button>
    <div class="title-text">그림 조각 맞추기</div>
  </div>
  <div class="pz-diff-btns">
    <button class="diff-btn" id="db2" onclick="startJigsawPuzzle(2)">4조각</button>
    <button class="diff-btn" id="db3" onclick="startJigsawPuzzle(3)">9조각</button>
    <button class="diff-btn" id="db4" onclick="startJigsawPuzzle(4)">16조각</button>
  </div>
  <div class="pz-layout">
    <div class="pz-left">
      <div style="font-weight:bold;color:var(--sky);">원본 그림</div>
      <div class="pz-preview" id="pz-preview"></div>
    </div>
    <div class="pz-right">
      <div style="font-weight:bold;color:var(--gold);">퍼즐 판</div>
      <div class="pz-board" id="pz-board"></div>
    </div>
  </div>
  <div class="pz-pieces-area" id="pz-pieces-area"></div>
</div>

<div class="screen hidden" id="catch">
  <div class="top-bar">
    <button class="back-btn" onclick="goHub()">← 그만하기</button>
    <div class="title-text">숨은 동물 찾기</div>
  </div>
  <div class="catch-info">
    <div>⏱️ <span id="catch-timer">30</span>초</div>
    <div>⭐ <span id="catch-score">0</span>점</div>
  </div>
  <div class="catch-area" id="catch-area"></div>
</div>

<div class="screen hidden" id="collection">
  <div class="top-bar">
    <button class="back-btn" onclick="goHub()">← 뒤로</button>
    <div class="title-text">나의 동물 도감</div>
  </div>
  <div class="dic-stats">모은 친구들: <span id="dic-count">0</span> / <span id="dic-total">0</span></div>
  <div class="dic-grid" id="dic-grid"></div>
</div>

<div class="overlay hidden" id="modal">
  <div class="mbox">
    <div class="micon" id="md-icon">🎉</div>
    <div class="mtitle" id="md-title">성공!</div>
    <div class="msub" id="md-sub">잘했어요!</div>
    <button class="mbtn" id="md-btn1" onclick="goHub()">확인</button>
    <button class="mbtn sec" id="md-btn2" style="display:none;" onclick="">취소</button>
  </div>
</div>

<script>
/* 💡 퍼즐에 사용할 이미지 URL (여기에 원하는 캐릭터 이미지 URL을 추가하세요!) */
const PUZZLE_IMAGES = [
  'https://images.unsplash.com/photo-1541364983171-a8ba01e95cfc?auto=format&fit=crop&w=400&q=80',
  'https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba?auto=format&fit=crop&w=400&q=80',
  'https://images.unsplash.com/photo-1474511320723-9a56873867b5?auto=format&fit=crop&w=400&q=80',
  'https://images.unsplash.com/photo-1564349683136-77e08dba1ef7?auto=format&fit=crop&w=400&q=80',
];

// 💡 일상 단어 110종 (글씨 쓰기 놀이 전용)
const DAILY_WORDS_DB = [
  {ko:'엄마', en:'Mom', e:'👩'}, {ko:'아빠', en:'Dad', e:'👨'}, {ko:'할머니', en:'Grandma', e:'👵'}, {ko:'할아버지', en:'Grandpa', e:'👴'},
  {ko:'아기', en:'Baby', e:'👶'}, {ko:'나', en:'Me', e:'🧒'}, {ko:'친구', en:'Friend', e:'👫'}, {ko:'선생님', en:'Teacher', e:'👩‍🏫'},
  {ko:'의사', en:'Doctor', e:'👩‍⚕️'}, {ko:'경찰', en:'Police', e:'👮'},
  {ko:'눈', en:'Eye', e:'👀'}, {ko:'코', en:'Nose', e:'👃'}, {ko:'입', en:'Mouth', e:'👄'}, {ko:'귀', en:'Ear', e:'👂'},
  {ko:'손', en:'Hand', e:'✋'}, {ko:'발', en:'Foot', e:'🦶'}, {ko:'머리', en:'Head', e:'💆'}, {ko:'팔', en:'Arm', e:'💪'},
  {ko:'다리', en:'Leg', e:'🦵'}, {ko:'얼굴', en:'Face', e:'🙂'},

let ax=null;

/* 오디오 엔진 강제 시작 */
function initA(){ 
  try{
    if(!ax) ax=new(window.AudioContext||window.webkitAudioContext)();
    if(ax.state === 'suspended') ax.resume();
  }catch(e){} 
}

function playDingDongDang(){
  initA(); if(!ax)return;
  const t=ax.currentTime;
  [[523.25, 0], [659.25, 0.15], [783.99, 0.3], [1046.5, 0.45]].forEach(([f, dl])=>{
    const o=ax.createOscillator(),g=ax.createGain();
    o.connect(g);g.connect(ax.destination);o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0,t+dl);
    g.gain.linearRampToValueAtTime(.4,t+dl+.02);
    g.gain.linearRampToValueAtTime(0,t+dl+.3);
    o.start(t+dl);o.stop(t+dl+.3);
  });
}

function playDdaeng(){
  initA(); if(!ax)return;
  const t=ax.currentTime;
  const o=ax.createOscillator(),g=ax.createGain();
  o.connect(g);g.connect(ax.destination);o.type='triangle';o.frequency.value=220; 
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(.4,t+.02);
  g.gain.linearRampToValueAtTime(0,t+.4);
  o.start(t);o.stop(t+.4);
}

let mOn=true, mt=null;
const ML=[
  [392.00,1], [329.63,1], [329.63,2], 
  [349.23,1], [293.66,1], [293.66,2],
  [261.63,1], [293.66,1], [329.63,1], [349.23,1],
  [392.00,1], [392.00,1], [392.00,2], [0,1]
];
const BT=0.25;
function bgm(){
  if(!ax||!mOn)return;
  let t=ax.currentTime+.05;
  ML.forEach(([f,b])=>{
    if(f > 0) {
      const o=ax.createOscillator(),g=ax.createGain();
      o.connect(g);g.connect(ax.destination);o.type='sine';o.frequency.value=f;
      const d=b*BT;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(.04,t+.02); 
      g.gain.linearRampToValueAtTime(.01,t+d*.7);
      g.gain.linearRampToValueAtTime(0,t+d-.01);
      o.start(t);o.stop(t+d);
    }
    t+=b*BT;
  });
  mt=setTimeout(()=>{if(mOn)bgm();},ML.reduce((a,[,b])=>a+b,0)*BT*1000+200);
}

let vko=null, vkoMale=null, vkoFemale=null;
let mediaUnlocked = false; 

function loadV(){ 
  const ko=(window.speechSynthesis?.getVoices()||[]).filter(v=>v.lang.startsWith('ko')); 
  if(ko.length > 0) {
    vkoFemale = ko.find(v=>v.name.includes('Female') || /(여성|girl|혜|수|지|은|미)/i.test(v.name)) || ko[0];
    vkoMale = ko.find(v=>v.name.includes('Male') || /(남성|boy|진|훈|민|철)/i.test(v.name));
    vko = vkoFemale;
  }
}
loadV(); if(window.speechSynthesis) window.speechSynthesis.onvoiceschanged=loadV;

function unlockMedia() {
  if(mediaUnlocked) return;
  mediaUnlocked = true;
  if(window.speechSynthesis) {
    const u = new SpeechSynthesisUtterance(''); u.volume = 0; window.speechSynthesis.speak(u);
  }
  initA();
  if(ax && ax.state === 'suspended') ax.resume().then(() => { if(mOn) bgm(); });
  else if(mOn) bgm();
}
document.body.addEventListener('touchstart', unlockMedia, {once:true});
document.body.addEventListener('click', unlockMedia, {once:true});

let curPitch = 1.3;
let curRate = 1.0;
let curVoice = null;

function randomizeVoice() {
  let isBoy = Math.random() > 0.5;
  curVoice = (isBoy && vkoMale) ? vkoMale : vkoFemale;
  curPitch = isBoy ? (0.6 + Math.random()*0.3) : (1.3 + Math.random()*0.4);
  curRate = 1.05 + Math.random()*0.1;
}

function speak(t, onEndCallback=null){
  if(!window.speechSynthesis) { if(onEndCallback) onEndCallback(); return; }
  window.speechSynthesis.cancel();
  setTimeout(() => {
    const u = new SpeechSynthesisUtterance(t); 
    u.lang='ko-KR'; u.rate=curRate; u.pitch=curPitch; 
    if(curVoice) u.voice = curVoice; else if(vko) u.voice = vko;
    if(onEndCallback) u.onend = onEndCallback;
    window.speechSynthesis.speak(u);
  }, 50); 
}

function throwConfetti() {
  const colors = ['#FFD43B', '#3de888', '#ff6454', '#7dd3fc', '#b584fa'];
  for(let i=0; i<40; i++) {
    let el = document.createElement('div');
    el.style.position = 'fixed'; el.style.left = '50%'; el.style.top = '50%';
    el.style.width = '16px'; el.style.height = '16px';
    el.style.backgroundColor = colors[~~(Math.random()*colors.length)];
    el.style.zIndex = '9999'; el.style.pointerEvents = 'none';
    document.body.appendChild(el);
    let angle = Math.random() * Math.PI * 2; let velocity = 80 + Math.random() * 250;
    let tx = Math.cos(angle) * velocity; let ty = Math.sin(angle) * velocity - 150;
    let rot = Math.random() * 360;
    el.animate([
      { transform: `translate(-50%, -50%) rotate(0deg) scale(1)`, opacity: 1 },
      { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty}px)) rotate(${rot}deg) scale(1.2)`, opacity: 1, offset: 0.7 },
      { transform: `translate(calc(-50% + ${tx}px), calc(-50% + ${ty + 150}px)) rotate(${rot+90}deg) scale(0.5)`, opacity: 0 }
    ], { duration: 1200 + Math.random()*800, easing: 'cubic-bezier(.25,.46,.45,.94)' }).onfinish = () => el.remove();
  }
}

let qLives=7, qCur=null, qHi=0, qPhase='hint';
let qChoices = []; 
const BLUR=[35, 15, 5, 0]; 
const SCL=[.7,.85,1.0,1.1];
const ROT=[-25, 15, -5, 0];

function startQuiz(){
  randomizeVoice(); 
  const sil=document.getElementById('sil');
  sil.style.transition = 'none'; 
  sil.className = 'sil'; 
  sil.textContent = '❓';
  sil.style.filter = `brightness(0) blur(${BLUR[0]}px)`; 
  sil.style.transform = `scale(${SCL[0]}) rotate(${ROT[0]}deg)`;
  
  let idx=~~(Math.random()*DB.length); qCur=DB[idx]; qHi=0; qPhase='hint';

  const others=DB.filter(a=>a.n!==qCur.n).sort(()=>Math.random()-.5).slice(0,3);
  qChoices=[...others,qCur].sort(()=>Math.random()-.5);

  document.getElementById('ht').textContent='버튼을 눌러 힌트를 들어봐요! 🔊';
  renderQuizBtns(); 
  show('quiz'); 

  requestAnimationFrame(() => requestAnimationFrame(() => {
    sil.textContent = qCur.e;
    sil.style.transition = 'filter 1.2s ease, transform 1.2s ease';
  }));
  
  setTimeout(() => { qNextHint(true); }, 600);
}

function renderHearts(){
  const w=document.getElementById('lives-wrap'); w.innerHTML='';
  for(let i=0;i<7;i++){ const s=document.createElement('span'); s.className=i<qLives?'heart':'heart lost'; s.textContent=i<qLives?'❤️':'🖤'; w.appendChild(s); }
}

function renderQuizBtns(){
  const act=document.getElementById('act');
  const hasM=qHi<qCur.h.length;
  act.innerHTML=`
    ${hasM?`<button class="abtn pri" onclick="qNextHint(false)" style="margin-bottom:6px;">🔊 ${qHi===0?'힌트 듣기':'다음 힌트 듣기'}</button>`:''}
    <div style="font-size:16px; font-weight:900; color:var(--sky); text-align:center; margin-bottom:8px;">어떤 동물일까요? 골라봐요! 👇</div>
    <div class="cgrid">
      ${qChoices.map(c=>`<button class="cbtn" onclick="qCheck('${c.n}',this)"><span class="ce">${c.e}</span><span class="cn">${c.n}</span></button>`).join('')}
    </div>
  `;
}

function qNextHint(isFirst = false){
  if(qHi>=qCur.h.length)return;
  let t=qCur.h[qHi]; 
  let displayText = (!t.startsWith('나는') && !t.startsWith('내 ')) ? '나는 ' + t : t;
  let speakText = isFirst ? '유나야 안녕? 나는 누구게~~? ' + displayText : displayText;

  document.getElementById('ht').textContent=displayText;
  qHi++; const step=Math.min(qHi,BLUR.length-1);
  const sil=document.getElementById('sil'); 
  sil.style.filter=`brightness(${step === 3 ? 1 : 0}) blur(${BLUR[step]}px)`; 
  sil.style.transform=`scale(${SCL[step]}) rotate(${ROT[step]}deg)`;
  
  speak(speakText); 
  renderQuizBtns();
}

function qCheck(ans, btn){
  if(qPhase==='done') return;
  if(ans===qCur.n){
    qPhase = 'done';
    btn.classList.add('ok'); 
    playDingDongDang(); 
    throwConfetti();
    
    const sil = document.getElementById('sil');
    sil.style.filter = `brightness(1) blur(0px)`;
    sil.style.transform = `scale(1.1) rotate(0deg)`;
    sil.classList.add('show');
    if(!unlocked.includes(qCur.n)){ unlocked.push(qCur.n); localStorage.setItem('animal_dic',JSON.stringify(unlocked)); }
    
    let fullVoiceText = `정답은, ${qCur.n}예요! ${qCur.n}는 영어로, ${qCur.en}! ${qCur.f} 또 하고 싶으면, 노란색 버튼을 눌러요!`;
    
    setTimeout(()=>{
      speak(fullVoiceText, () => {
         const nbtn = document.getElementById('md-btn1');
         if(nbtn) nbtn.classList.add('blink-btn');
      });
    }, 600); 
    
    setTimeout(()=>{
      openModal(qCur.e, '정답이에요!', `${qCur.n} (영어: ${qCur.en})`, '다음 문제', startQuiz);
      setTimeout(() => { const nbtn = document.getElementById('md-btn1'); if(nbtn) nbtn.classList.add('blink-btn'); }, 4000);
    }, 1500);

  } else {
    btn.classList.add('ng'); 
    playDdaeng(); 
    setTimeout(() => { speak('아니에요. 다시 한번 골라볼까요?'); }, 400);
  }
}

let dailyCur = null;
let drawCanvas = null;
let drawCtx = null;
let isDrawing = false;

function startPhonics() {
  show('phonics');
  drawCanvas = document.getElementById('draw-canvas');
  drawCtx = drawCanvas.getContext('2d');
  
  const rect = drawCanvas.parentElement.getBoundingClientRect();
  drawCanvas.width = rect.width;
  drawCanvas.height = rect.height;

  drawCanvas.addEventListener('touchstart', startDrawing, {passive: false});
  drawCanvas.addEventListener('touchmove', draw, {passive: false});
  drawCanvas.addEventListener('touchend', stopDrawing);
  
  drawCanvas.addEventListener('mousedown', startDrawing);
  drawCanvas.addEventListener('mousemove', draw);
  drawCanvas.addEventListener('mouseup', stopDrawing);
  drawCanvas.addEventListener('mouseout', stopDrawing);

  nextDailyWord();
}

function nextDailyWord() {
  randomizeVoice();
  dailyCur = DAILY_WORDS_DB[~~(Math.random()*DAILY_WORDS_DB.length)];
  
  document.getElementById('ph-word-emoji').textContent = dailyCur.e;
  document.getElementById('ph-word-ko').textContent = dailyCur.ko;
  document.getElementById('ph-word-en').textContent = dailyCur.en;
  document.getElementById('ph-bg-text').textContent = dailyCur.ko;
  
  clearCanvas(true);
  playDailyWord();
}

function playDailyWord() {
  playDingDongDang();
  throwConfetti();
  speak(`${dailyCur.ko}! 영어로는, ${dailyCur.en}! 글씨를 예쁘게 따라 써볼까요?`);
}

function startDrawing(e) {
  e.preventDefault();
  isDrawing = true;
  initA();
  draw(e);
}

function draw(e) {
  if (!isDrawing) return;
  e.preventDefault();
  
  const rect = drawCanvas.getBoundingClientRect();
  const scaleX = drawCanvas.width / rect.width;
  const scaleY = drawCanvas.height / rect.height;
  
  let clientX = e.touches ? e.touches[0].clientX : e.clientX;
  let clientY = e.touches ? e.touches[0].clientY : e.clientY;
  
  const x = (clientX - rect.left) * scaleX;
  const y = (clientY - rect.top) * scaleY;

  drawCtx.lineWidth = 25; 
  drawCtx.lineCap = 'round';
  drawCtx.lineJoin = 'round';
  drawCtx.strokeStyle = '#FFD43B'; 

  drawCtx.lineTo(x, y);
  drawCtx.stroke();
  drawCtx.beginPath();
  drawCtx.moveTo(x, y);
}

function stopDrawing(e) {
  if(e) e.preventDefault();
  isDrawing = false;
  drawCtx.beginPath();
}

function clearCanvas(silent = false) {
  if(!silent) playDdaeng(); 
  drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  drawCtx.beginPath();
}

/* ═══════════════════════
   3. 드래그 직소 퍼즐
═══════════════════════ */
let pzSize = 2; 

function startJigsawPuzzle(size = pzSize) {
  pzSize = size;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`db${size}`).classList.add('active');

  let imgUrl = PUZZLE_IMAGES[~~(Math.random() * PUZZLE_IMAGES.length)];
  
  let preview = document.getElementById('pz-preview');
  preview.style.backgroundImage = `url('${imgUrl}')`;

  let board = document.getElementById('pz-board');
  board.innerHTML = '';
  board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;
  board.style.gridTemplateRows = `repeat(${size}, 1fr)`;
  
  let pieceArea = document.getElementById('pz-pieces-area');
  pieceArea.innerHTML = '';

  let piecesArr = [];

  for(let y=0; y<size; y++){
    for(let x=0; x<size; x++){
      let slot = document.createElement('div');
      slot.className = 'pz-slot';
      slot.dataset.x = x; slot.dataset.y = y;
      board.appendChild(slot);

      let piece = document.createElement('div');
      piece.className = 'drag-piece';
      piece.style.backgroundImage = `url('${imgUrl}')`;
      piece.style.backgroundSize = `${size * 100}% ${size * 100}%`;
      piece.style.backgroundPosition = `${x * (100 / (size-1))}% ${y * (100 / (size-1))}%`;
      piece.dataset.x = x; piece.dataset.y = y;
      
      piecesArr.push(piece);
    }
  }

  piecesArr.sort(()=>Math.random()-0.5).forEach(p => pieceArea.appendChild(p));

  setupDragAndDrop();
  show('puzzle');
  randomizeVoice();
  speak('유나야, 그림 조각을 당겨서 똑같이 맞춰봐요!');
}

function setupDragAndDrop() {
  const pieces = document.querySelectorAll('.drag-piece');
  const slots = document.querySelectorAll('.pz-slot');
  let draggedEl = null;
  let startX, startY, initialLeft, initialTop;

  pieces.forEach(p => {
    p.addEventListener('touchstart', (e) => {
      initA(); 
      draggedEl = p;
      const touch = e.touches[0];
      const rect = p.getBoundingClientRect();
      startX = touch.clientX; startY = touch.clientY;
      initialLeft = rect.left; initialTop = rect.top;
      
      p.style.position = 'fixed';
      p.style.left = initialLeft + 'px';
      p.style.top = initialTop + 'px';
      p.style.zIndex = 1000;
      p.style.transform = 'scale(1.1)';
    });

    p.addEventListener('touchmove', (e) => {
      if(!draggedEl) return;
      e.preventDefault(); 
      const touch = e.touches[0];
      const dx = touch.clientX - startX;
      const dy = touch.clientY - startY;
      draggedEl.style.left = initialLeft + dx + 'px';
      draggedEl.style.top = initialTop + dy + 'px';
    });

    p.addEventListener('touchend', (e) => {
      if(!draggedEl) return;
      draggedEl.style.transform = 'scale(1)';
      draggedEl.style.zIndex = 100;
      
      const touch = e.changedTouches[0];
      let droppedOnSlot = false;

      slots.forEach(slot => {
        const sRect = slot.getBoundingClientRect();
        if (touch.clientX > sRect.left && touch.clientX < sRect.right &&
            touch.clientY > sRect.top && touch.clientY < sRect.bottom) {
          
          if(slot.dataset.x === draggedEl.dataset.x && slot.dataset.y === draggedEl.dataset.y && slot.children.length === 0) {
            slot.appendChild(draggedEl);
            draggedEl.classList.add('placed');
            draggedEl.style.position = 'relative';
            draggedEl.style.left = '0'; draggedEl.style.top = '0';
            playDingDongDang();
            droppedOnSlot = true;
            checkJigsawComplete();
          }
        }
      });

      if(!droppedOnSlot) {
        playDdaeng();
        draggedEl.style.position = 'relative';
        draggedEl.style.left = '0'; draggedEl.style.top = '0';
      }
      draggedEl = null;
    });
  });
}

function checkJigsawComplete() {
  const pieces = document.querySelectorAll('.drag-piece.placed');
  if(pieces.length === pzSize * pzSize) {
    throwConfetti();
    setTimeout(() => {
      speak('우와! 그림을 예쁘게 다 맞췄어요! 정말 대단해요!', () => {
         const nbtn = document.getElementById('md-btn1');
         if(nbtn) nbtn.classList.add('blink-btn');
      });
      openModal('🏆', '퍼즐 완성!', '정말 대단해요!', '다음 퍼즐', () => startJigsawPuzzle(pzSize));
    }, 500);
  }
}

/* ═══════════════════════
   4. 숨은 동물 찾기 (CATCH)
═══════════════════════ */
let catchScore = 0;
let catchTimeLeft = 30;
let catchInterval = null;
let currentTarget = null;

function startCatchGame() {
  catchScore = 0; catchTimeLeft = 30;
  document.getElementById('catch-score').textContent = catchScore;
  document.getElementById('catch-timer').textContent = catchTimeLeft;
  document.getElementById('catch-area').innerHTML = '';
  
  show('catch');
  randomizeVoice();
  speak('유나야, 튀어나오는 동물을 재빨리 터치해서 잡아봐요!');
  
  clearInterval(catchInterval);
  catchInterval = setInterval(() => {
    catchTimeLeft--;
    document.getElementById('catch-timer').textContent = catchTimeLeft;
    if(catchTimeLeft <= 0) {
      endCatchGame();
    }
  }, 1000);
  
  spawnTarget();
}

function spawnTarget() {
  if(catchTimeLeft <= 0) return;
  const area = document.getElementById('catch-area');
  area.innerHTML = ''; 
  
  let c = DB[~~(Math.random()*DB.length)];
  let el = document.createElement('div');
  el.className = 'catch-target';
  el.textContent = c.e;
  
  let maxX = area.clientWidth - 100;
  let maxY = area.clientHeight - 100;
  el.style.left = Math.max(10, Math.random() * maxX) + 'px';
  el.style.top = Math.max(10, Math.random() * maxY) + 'px';
  
  el.onclick = () => {
    playDingDongDang();
    catchScore += 10;
    document.getElementById('catch-score').textContent = catchScore;
    
    el.textContent = '💥';
    el.style.transform = 'scale(1.5)';
    setTimeout(spawnTarget, 200);
  };
  
  area.appendChild(el);
  
  currentTarget = setTimeout(() => {
    if(area.contains(el)) spawnTarget();
  }, 1200);
}

function endCatchGame() {
  clearInterval(catchInterval);
  clearTimeout(currentTarget);
  document.getElementById('catch-area').innerHTML = '<div style="font-size:100px;text-align:center;margin-top:20%;">⏰</div>';
  throwConfetti();
  speak(`시간 다 됐어요! 와, ${catchScore}점이나 얻었네요! 최고 최고!`, () => {
     const nbtn = document.getElementById('md-btn1');
     if(nbtn) nbtn.classList.add('blink-btn');
  });
  setTimeout(()=>openModal('💯', '게임 종료!', `총 ${catchScore}점을 얻었어요!`, '다시 하기', startCatchGame), 1000);
}

/* ═══════════════════════
   5. 도감 (COLLECTION)
═══════════════════════ */
function showCollection(){
  const grid=document.getElementById('dic-grid'); grid.innerHTML='';
  document.getElementById('dic-total').textContent=DB.length;
  document.getElementById('dic-count').textContent=unlocked.length;
  
  const sortedDB = [...DB].sort((a,b)=>a.n.localeCompare(b.n));
  sortedDB.forEach(c=>{
    const has = unlocked.includes(c.n);
    const el=document.createElement('div'); el.className=`dic-item ${has?'unlocked':'locked'}`;
    el.innerHTML=`<div class="dic-e">${c.e}</div><div class="dic-n">${has?c.n:'???'}</div>`;
    if(has) el.onclick=()=>{ 
      playDingDongDang(); 
      randomizeVoice(); 
      speak(`이건 ${c.n}예요! 영어로는 ${c.en}!`); 
      el.querySelector('.dic-e').style.transform = 'scale(1.3)';
      setTimeout(()=>el.querySelector('.dic-e').style.transform = 'none', 500);
    };
    grid.appendChild(el);
  });
  show('collection');
}
